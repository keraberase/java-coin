<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <h1></h1> Coin Toss!</h1>
    <img id="coin">
    <button onclick="toss()">Toss!</button>

    <div class="card">
        <div class="stat"><span class="num" id="tot">0</span><span class="lbl">Total</span></div>
        <div class="stat"><span class="num" id="h">0</span><span class="lbl">Heads</span></div>
        <div class="stat"><span class="num" id="t">0</span><span class="lbl">Tails</span></div>
    </div>

<script>
    let tot = 0, h = 0, t = 0;

    function toss() {
        const isHeads = Math.random() < 0.5;
        const coin = document.getElementById("coin");

        coin.classList.remove("spinning");
        void coin.offsetWidth;
        coin.classList.add("spinning");

        setTimeout(() => {
            coin.src = isHeads ? "images/Image20260312091501.png" : "images/Image20260312091456.png";
        }, 300);

        tot++; isHeads ? h++ : t++;
        document.getElementById("tot").textContent = tot;
        document.getElementById("h").textContent = h;
        document.getElementById("t").textContent = t;
    }
</script>
</body>
</html>
