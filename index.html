<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Toss</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #ff6b9d;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }

        h1 { 
            color: white; 
            font-size: 40px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2); 
            margin: 0; 
        }

        img { 
            height: 130px; 
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.3)); 
        }

        @keyframes flip { 0%,100% { transform: rotateX(0); } 50% { transform: rotateX(90deg); } }
        .spinning { animation: flip 0.6s ease-in-out; }

        button {
            padding: 14px 40px;
            font-size: 19px;
            font-weight: bold;
            background: white;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 20px 40px;
            display: flex;
            gap: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .stat { 
            text-align: center; 
        }
        .stat span { 
            display: block;
        }
        .stat .num { 
            font-size: 16px;
            font-weight: bold;  }
        .stat .lbl { 
            font-size: 12px; 
            color: #aaa; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
        }
    </style>
</head>
<body>
    <h1></h1> Coin Toss!</h1>
    <img id="coin">
    <button onclick="toss()">Toss!</button>

    <div class="card">
        <div class="stat"><span class="num" id="tot">0</span><span class="lbl">Total</span></div>
        <div class="stat"><span class="num" id="h">0</span><span class="lbl">Heads</span></div>
        <div class="stat"><span class="num" id="t">0</span><span class="lbl">Tails</span></div>
    </div>

<script>
    let tot = 0, h = 0, t = 0;

    function toss() {
        const isHeads = Math.random() < 0.5;
        const coin = document.getElementById("coin");

        coin.classList.remove("spinning");
        void coin.offsetWidth;
        coin.classList.add("spinning");

        setTimeout(() => {
            coin.src = isHeads ? "images/Image20260312091501.png" : "images/Image20260312091456.png";
        }, 300);

        tot++; isHeads ? h++ : t++;
        document.getElementById("tot").textContent = tot;
        document.getElementById("h").textContent = h;
        document.getElementById("t").textContent = t;
    }
</script>
</body>
</html>
